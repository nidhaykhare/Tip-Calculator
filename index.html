<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip Calculator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Tip Calculator</h1>
        <div class="calculator">
            <label for="bill">Bill Amount: </label>
            <input type="number" id="bill" placeholder="Enter Bill Amount" />

            <label for="tip">Tip Percentage: </label>
            <input type="number" id="tip" placeholder="Enter Tip Percentage"/>
            
            <label for="result">Amount</label>
            <input type="text" id="result" placeholder="Total Amount to Pay">

            <button id="calculate">Calculate Bill</button>
            
        </div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
